# Codemagic build recipe for producing an UNSIGNED iOS .ipa that can be
# sideloaded onto an iPhone with AltStore / Sideloadly using a FREE Apple ID.
#
# Why unsigned: sideload tools re-sign the app themselves with your free Apple
# ID on your Windows PC, so Codemagic must NOT sign it (signing here would need
# a paid Apple Developer account — exactly what this route avoids).
#
# How to use:
#  1. Push this repo to GitHub/GitLab (or upload it in the Codemagic UI).
#  2. On codemagic.io (free tier is enough), add the app and pick the
#     "ios-sideload-unsigned" workflow below.
#  3. Start a build. When it finishes, download the .ipa artifact.
#  4. On your Windows PC, open Sideloadly (or AltStore), plug in the iPhone,
#     sign in with your free Apple ID, drag in the .ipa, and install.
#     (Free Apple ID signatures last 7 days; AltStore can auto-refresh them.)

workflows:
  ios-sideload-unsigned:
    name: iOS unsigned IPA (sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Build unsigned iOS app
        # --no-codesign: produce Runner.app without any signing identity.
        script: flutter build ios --release --no-codesign
      - name: Strip code signatures for AltStore compatibility
        # WHY: On Apple-Silicon build machines (this runner is an M2 Mac) the
        # linker stamps every Mach-O with an "ad-hoc / linker-signed" signature
        # even under --no-codesign. AltStore's bundled `ldid` cannot parse that
        # newer signature format and aborts with:
        #   ldid.cpp(1461): _assert(): end >= size - 0x10
        # (Confirmed on AltStore issues #1660 / #1034 — Sideloadly/Esign work
        #  because they use a different signer.) Removing the existing signature
        # entirely gives ldid a clean binary to sign from scratch with the free
        # Apple ID, sidestepping the parse assert. AltStore re-signs the app and
        # ALL nested frameworks at install time, so shipping them unsigned here
        # is correct.
        script: |
          set -e
          APP="build/ios/iphoneos/Runner.app"
          echo "Stripping signatures from every Mach-O in $APP ..."
          # 1) Every Mach-O file (main executable, dylibs, framework binaries).
          find "$APP" -type f | while IFS= read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --remove-signature "$f" 2>/dev/null && echo "  stripped: $f" || true
            fi
          done
          # 2) The framework bundles and the app bundle themselves.
          find "$APP" -type d -name "*.framework" | while IFS= read -r fw; do
            codesign --remove-signature "$fw" 2>/dev/null && echo "  stripped bundle: $fw" || true
          done
          codesign --remove-signature "$APP" 2>/dev/null || true
          echo "Signature strip complete."
      - name: Package Runner.app into an unsigned .ipa
        script: |
          set -e
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r9 iptv_player-unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      # Download this from the Codemagic build page, then feed it to
      # Sideloadly / AltStore on your PC.
      - build/ios/iphoneos/*.ipa
