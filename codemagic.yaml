# Codemagic build recipe for producing an iOS .ipa that can be sideloaded
# onto an iPhone with AltStore using a FREE Apple ID.
#
# ── Hard-won knowledge (2026-07-10) ─────────────────────────────────────────
# AltServer signs apps with a vendored old `ldid` that hard-asserts
#   ldid.cpp(1461): _assert(): end >= size - 0x10
# unless every Mach-O's code-signature blob starts within 16 bytes of the
# symbol string-table end. Two states BOTH fail that check on this app:
#   1. The raw build output: media_kit/libmpv prebuilt dylibs ship with
#      page-gapped signature offsets (same as Spotube/Kazumi/AnymeX/Fladder —
#      all media_kit Flutter apps, all hit this exact assert).
#   2. Signature-STRIPPED binaries (codesign --remove-signature): documented
#      in Fladder #36/#800 — "completely unsigned inner Flutter frameworks"
#      trigger the same assert. Stripping is the WRONG fix.
# The CONFIRMED fix (AnymeX PR #93, merged with install proof; endorsed by
# Kazumi's maintainer; Fladder screenshots) is to RE-SIGN everything with a
# fresh dummy signature so each binary gets a compact, well-aligned
# LC_CODE_SIGNATURE that old ldid can parse and then overwrite with the free
# Apple ID. We use Apple's own `codesign -f -s -` (ad-hoc, zero secrets).
# A verification gate below re-implements ldid's exact assert arithmetic and
# FAILS THE BUILD if any binary would still trip it — no more blind downloads.
# ─────────────────────────────────────────────────────────────────────────────

workflows:
  ios-sideload-unsigned:
    name: iOS unsigned IPA (sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Build iOS app (no distribution signing)
        script: flutter build ios --release --no-codesign
      - name: Ad-hoc re-sign every framework + app (AltStore ldid compatibility)
        # Re-sign, do NOT strip: gives every Mach-O a fresh compact signature
        # that AltServer's old ldid can parse (see header comment). Bottom-up:
        # frameworks first, then the app shell. Stale _CodeSignature seals are
        # removed first; codesign regenerates them consistently.
        script: |
          set -e
          APP="build/ios/iphoneos/Runner.app"
          find "$APP" -name "_CodeSignature" -type d -prune -exec rm -rf {} +
          for fw in "$APP"/Frameworks/*.framework; do
            codesign --force --sign - --timestamp=none "$fw"
            echo "re-signed: $fw"
          done
          codesign --force --sign - --timestamp=none "$APP"
          echo "re-signed app shell: $APP"
      - name: Gate — verify every binary passes AltServer's ldid assert
        # Byte-for-byte replica of ldid Allocate() (the "end >= size - 0x10"
        # assert): with a signature present, ldid requires
        #   0 <= LC_CODE_SIGNATURE.dataoff - (stroff + strsize) <= 0x10
        # If ANY binary fails, abort the build and name it — do not let a
        # doomed ipa reach the user's phone.
        script: |
          set -e
          cat > /tmp/ldid_gate.py << 'PYEOF'
          import os, struct, sys

          APP = "build/ios/iphoneos/Runner.app"
          LC_SYMTAB, LC_CODE_SIGNATURE = 0x2, 0x1d
          MAGICS = (0xcafebabe, 0xbebafeca, 0xfeedface, 0xcefaedfe, 0xfeedfacf, 0xcffaedfe)

          def slices(data):
              magic = struct.unpack(">I", data[:4])[0]
              if magic in (0xcafebabe, 0xbebafeca):
                  be = magic == 0xcafebabe
                  n = struct.unpack((">" if be else "<") + "I", data[4:8])[0]
                  off, out = 8, []
                  for _ in range(n):
                      o, s = struct.unpack((">" if be else "<") + "II", data[off+8:off+16])
                      out.append((o, s)); off += 20
                  return out
              return [(0, len(data))]

          bad, checked = [], 0
          for root, dirs, files in os.walk(APP):
              for fn in files:
                  fp = os.path.join(root, fn)
                  with open(fp, "rb") as fh:
                      head = fh.read(4)
                  if len(head) < 4 or struct.unpack(">I", head)[0] not in MAGICS:
                      continue
                  data = open(fp, "rb").read()
                  for so, ssize in slices(data):
                      m = struct.unpack(">I", data[so:so+4])[0]
                      if m in (0xfeedface, 0xcefaedfe): is64, le = False, m == 0xcefaedfe
                      elif m in (0xfeedfacf, 0xcffaedfe): is64, le = True, m == 0xcffaedfe
                      else: continue
                      e = "<" if le else ">"
                      ncmds = struct.unpack(e+"I", data[so+16:so+20])[0]
                      off = so + (32 if is64 else 28)
                      stroff = strsize = sig = None
                      for _ in range(ncmds):
                          cmd, csz = struct.unpack(e+"II", data[off:off+8])
                          if cmd == LC_SYMTAB:
                              _, _, stroff, strsize = struct.unpack(e+"IIII", data[off+8:off+24])
                          elif cmd == LC_CODE_SIGNATURE:
                              sig = struct.unpack(e+"I", data[off+8:off+12])[0]
                          off += csz
                      rel = os.path.relpath(fp, APP)
                      checked += 1
                      if sig is None:
                          bad.append(f"{rel}: NO code signature (re-sign step failed?)")
                          continue
                      if stroff is None or (stroff == 0 and strsize == 0):
                          print(f"  ok (no symtab)      {rel}")
                          continue
                      end, size = stroff + strsize, sig
                      gap = size - end
                      if end <= size and end >= size - 0x10:
                          print(f"  ok (gap {gap:>3})       {rel}")
                      else:
                          bad.append(f"{rel}: gap {gap} bytes — ldid WILL abort on this file")

          print(f"\nchecked {checked} Mach-O slices")
          if bad:
              print("GATE FAILED — these binaries would trip AltServer's ldid assert:")
              for b in bad: print("   " + b)
              sys.exit(1)
          print("GATE PASSED — every binary satisfies ldid's end >= size - 0x10 check.")
          PYEOF
          python3 /tmp/ldid_gate.py
      - name: Package Runner.app into the .ipa
        script: |
          set -e
          cd build/ios/iphoneos
          rm -rf Payload
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r9 iptv_player-unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      # Download this from the Codemagic build page, then install via AltStore.
      - build/ios/iphoneos/*.ipa
